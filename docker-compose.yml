services:
  # Reverse proxy with automatic HTTPS
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - rainbot-web

  # Booking scheduler (background job)
  rainbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rainbot
    restart: unless-stopped
    volumes:
      - rainbot-data:/app/data
    environment:
      # Scheduler configuration
      - HOUR=${HOUR:-0}
      - MINUTE=${MINUTE:-0}
      - SECOND=${SECOND:-10}
      - JITTER=${JITTER:-0}

      # Paris Tennis credentials
      - PARIS_TENNIS_EMAIL=${PARIS_TENNIS_EMAIL}
      - PARIS_TENNIS_PASSWORD=${PARIS_TENNIS_PASSWORD}

      # Google Sheets configuration
      - CLIENT_SECRET=${CLIENT_SECRET}
      - GOOGLE_SPREADSHEET_ID=${GOOGLE_SPREADSHEET_ID}

      # 2Captcha configuration
      - CAPTCHA_API_KEY=${CAPTCHA_API_KEY}

      # Email notification configuration
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - FROM_EMAIL=${FROM_EMAIL}

      # SQLite database path
      - SQLITE_DB_PATH=/app/data/rainbot.db

      # Optional debug mode
      - DEBUG=${DEBUG:-false}
    shm_size: "2gb"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Web application (API + frontend)
  rainbot-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: rainbot-web
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - rainbot-data:/app/data
    environment:
      # JWT configuration
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-rainbot-secret-change-me}

      # Paris Tennis credentials (for login validation)
      - PARIS_TENNIS_PASSWORD=${PARIS_TENNIS_PASSWORD}

      # Google Sheets configuration
      - CLIENT_SECRET=${CLIENT_SECRET}
      - GOOGLE_SPREADSHEET_ID=${GOOGLE_SPREADSHEET_ID}

      # SQLite database path
      - SQLITE_DB_PATH=/app/data/rainbot.db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  rainbot-data:
  caddy-data:
  caddy-config:
