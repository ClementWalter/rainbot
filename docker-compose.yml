services:
  # Booking scheduler (background job)
  rainbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rainbot
    restart: unless-stopped
    environment:
      # Scheduler configuration
      - HOUR=${HOUR:-0}
      - MINUTE=${MINUTE:-0}
      - SECOND=${SECOND:-10}
      - JITTER=${JITTER:-0}

      # Paris Tennis credentials
      - PARIS_TENNIS_EMAIL=${PARIS_TENNIS_EMAIL}
      - PARIS_TENNIS_PASSWORD=${PARIS_TENNIS_PASSWORD}

      # Google Sheets configuration
      - CLIENT_SECRET=${CLIENT_SECRET}
      - GOOGLE_SPREADSHEET_ID=${GOOGLE_SPREADSHEET_ID}

      # 2Captcha configuration
      - CAPTCHA_API_KEY=${CAPTCHA_API_KEY}

      # Email notification configuration
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - FROM_EMAIL=${FROM_EMAIL}

      # Optional debug mode
      - DEBUG=${DEBUG:-false}
    shm_size: "2gb"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Web application (API + frontend)
  rainbot-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: rainbot-web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # JWT configuration
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-rainbot-secret-change-me}

      # Paris Tennis credentials (for login validation)
      - PARIS_TENNIS_PASSWORD=${PARIS_TENNIS_PASSWORD}

      # Google Sheets configuration
      - CLIENT_SECRET=${CLIENT_SECRET}
      - GOOGLE_SPREADSHEET_ID=${GOOGLE_SPREADSHEET_ID}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
