<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Tennis ball base -->
  <circle cx="50" cy="50" r="45" fill="#ccff00"/>
  <!-- Tennis ball seam curve 1 -->
  <path d="M 15 50 Q 50 20 85 50" fill="none" stroke="#ffffff" stroke-width="4"/>
  <!-- Tennis ball seam curve 2 -->
  <path d="M 15 50 Q 50 80 85 50" fill="none" stroke="#ffffff" stroke-width="4"/>
  <!-- Subtle shadow for depth -->
  <circle cx="50" cy="50" r="45" fill="url(#shadow)"/>
  <defs>
    <radialGradient id="shadow" cx="30%" cy="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.1"/>
    </radialGradient>
  </defs>
</svg>
