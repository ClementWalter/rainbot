version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.7.4
      uri: https://github.com/trunk-io/plugins
runtimes:
  enabled:
    - node@22.16.0
    - python@3.10.8
lint:
  enabled:
    - checkov@3.2.497
    - hadolint@2.14.0
    - markdownlint@0.47.0
    - prettier@3.8.0
    - yamllint@1.38.0
    - bandit@1.9.3
    - black@26.1.0
    - git-diff-check
    - isort@7.0.0
    - osv-scanner@2.3.2
    - ruff@0.14.13
    - taplo@0.10.0
    - trivy@0.68.2
    - trufflehog@3.92.5
  ignore:
    - linters: [bandit]
      paths:
        - tests/**
        - scripts/test_*
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
