{% extends "base.html" %} {% block title %}Login · RainClaude Tennis{% endblock
%} {% block content %}
<section class="card auth-card">
  <h2>Sign in</h2>
  <p class="muted">Use your allow-listed Paris Tennis credentials.</p>
  <form method="post" action="/login" class="stack-form">
    <label>
      Paris username
      <input type="text" name="paris_username" required />
    </label>
    <label>
      Paris password
      <input type="password" name="paris_password" required />
    </label>
    <button type="submit" class="primary-button">Login</button>
  </form>
</section>

{% if needs_bootstrap %}
<section class="card auth-card">
  <h2>Create first admin</h2>
  <p class="muted">
    Bootstrap is available only once when the database is empty.
  </p>
  <form method="post" action="/bootstrap-admin" class="stack-form">
    <label>
      Display name
      <input type="text" name="display_name" required />
    </label>
    <label>
      Paris username
      <input type="text" name="paris_username" required />
    </label>
    <label>
      Paris password
      <input type="password" name="paris_password" required />
    </label>
    <button type="submit" class="secondary-button">Create admin</button>
  </form>
</section>
{% endif %} {% endblock %}
