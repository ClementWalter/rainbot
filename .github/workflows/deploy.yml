name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/rainbot
            git pull origin master

            # Clean up disk space
            docker system prune -af

            # Build and deploy scheduler
            docker compose build --no-cache rainbot
            docker compose up -d rainbot

            # Build and deploy web app
            docker compose build --no-cache rainbot-web
            docker compose up -d rainbot-web

            # Deploy reverse proxy (Caddy)
            docker compose up -d caddy

            # Show status
            docker compose ps
            docker compose logs --tail=5
