name: Deploy to Scaleway VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Sync code to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.git' --exclude='.env*' --exclude='data/' --exclude='.venv'
          path: ./
          remote_path: /opt/rainbot/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Build and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            cd /opt/rainbot

            # Build image with layer caching (Dockerfile has proper COPY ordering)
            docker build -t rainbot:latest .
            docker stop rainbot 2>/dev/null || true
            docker rm rainbot 2>/dev/null || true
            docker run -d \
              --name rainbot \
              --restart unless-stopped \
              -v rainbot-data:/app/data \
              -p 8000:8000 \
              rainbot:latest

            # Verify container actually started
            sleep 3
            CONTAINER=$(docker ps -qf name=rainbot | head -1)
            if [ -z "$CONTAINER" ]; then
              echo "ERROR: Container failed to start"
              docker logs rainbot 2>&1 | tail -20
              exit 1
            fi
            echo "Container started at: $(docker inspect --format '{{.State.StartedAt}}' "$CONTAINER")"
            docker ps --format "{{.Names}}: {{.Status}}" | grep rainbot

            # Clean up old images
            docker image prune -f
