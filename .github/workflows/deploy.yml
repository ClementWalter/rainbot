name: Deploy to Scaleway VPS

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/clementwalter/rainbot:latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ghcr.io/clementwalter/rainbot:latest
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE
          command_timeout: 5m
          script: |
            # Pull pre-built image (public repo, no auth needed)
            docker pull $IMAGE

            docker stop rainbot 2>/dev/null || true
            docker rm rainbot 2>/dev/null || true
            docker run -d \
              --name rainbot \
              --restart unless-stopped \
              -v rainbot-data:/app/data \
              -p 8000:8000 \
              $IMAGE

            # Verify container actually started
            sleep 3
            CONTAINER=$(docker ps -qf name=rainbot | head -1)
            if [ -z "$CONTAINER" ]; then
              echo "ERROR: Container failed to start"
              docker logs rainbot 2>&1 | tail -20
              exit 1
            fi
            echo "Container started at: $(docker inspect --format '{{.State.StartedAt}}' "$CONTAINER")"
            docker ps --format "{{.Names}}: {{.Status}}" | grep rainbot

            # Clean up old images
            docker image prune -f
