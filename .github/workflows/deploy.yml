name: Deploy to Scaleway VPS

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/clementwalter/rainbot:latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Hard cap so a hung SSH session never burns CI minutes indefinitely.
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        # GitHub-enforced step timeout — independent of action's own command_timeout,
        # which wasn't being respected and let the step hang past 25 minutes.
        timeout-minutes: 10
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ghcr.io/clementwalter/rainbot:latest
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE
          command_timeout: 8m
          script: |
            set -euo pipefail

            # Hard-deadline each remote command with `timeout` so a stuck
            # docker pull can't wedge the SSH session indefinitely.
            echo "=== pulling image ==="
            timeout 360 docker pull "$IMAGE"

            echo "=== replacing container ==="
            timeout 30 docker stop rainbot 2>/dev/null || true
            timeout 30 docker rm rainbot 2>/dev/null || true
            docker run -d \
              --name rainbot \
              --restart unless-stopped \
              -v rainbot-data:/app/data \
              -p 8000:8000 \
              "$IMAGE"

            sleep 3
            CONTAINER=$(docker ps -qf name=rainbot | head -1)
            if [ -z "$CONTAINER" ]; then
              echo "ERROR: Container failed to start"
              docker logs rainbot 2>&1 | tail -20
              exit 1
            fi
            echo "Container started at: $(docker inspect --format '{{.State.StartedAt}}' "$CONTAINER")"
            docker ps --format "{{.Names}}: {{.Status}}" | grep rainbot

            echo "=== pruning old images ==="
            timeout 60 docker image prune -f
