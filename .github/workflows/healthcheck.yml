name: Healthcheck and auto-reboot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe rainbot.fr
        id: probe
        run: |
          URL="https://rainbot.fr/health"
          UA="Mozilla/5.0 (compatible; rainbot-healthcheck; +https://github.com/ClementWalter/rainbot)"
          # Three attempts spaced over ~30s so we don't reboot on a transient blip.
          # We treat any <500 response as "origin alive" — 4xx means Cloudflare answered
          # (possibly blocking the runner), which proves the origin is reachable from CF.
          # Only 5xx (esp. CF 522/523 "origin unreachable") and connection failures (000)
          # indicate the VPS is actually down.
          for i in 1 2 3; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -A "$UA" "$URL" || echo "000")
            echo "attempt $i: HTTP $CODE"
            if [ "$CODE" != "000" ] && [ "$CODE" -lt 500 ] 2>/dev/null; then
              echo "healthy=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 10
          done
          echo "healthy=false" >> "$GITHUB_OUTPUT"
          echo "last_code=$CODE" >> "$GITHUB_OUTPUT"

      - name: Reboot Scaleway instance
        if: steps.probe.outputs.healthy == 'false'
        env:
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_SERVER_ID: ${{ secrets.SCW_SERVER_ID }}
          SCW_ZONE: ${{ secrets.SCW_ZONE }}
        run: |
          echo "Site unreachable (last code ${{ steps.probe.outputs.last_code }}), triggering reboot"
          HTTP=$(curl -s -o /tmp/scw.json -w "%{http_code}" \
            -X POST \
            -H "X-Auth-Token: $SCW_SECRET_KEY" \
            -H "Content-Type: application/json" \
            -d '{"action":"reboot"}' \
            "https://api.scaleway.com/instance/v1/zones/$SCW_ZONE/servers/$SCW_SERVER_ID/action")
          cat /tmp/scw.json
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "202" ]; then
            echo "Reboot API call failed with HTTP $HTTP"
            exit 1
          fi
