name: Healthcheck and auto-reboot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe origin via SSH (bypass Cloudflare)
        # Probing through Cloudflare is unreliable: CF often returns 403 to
        # GitHub runner IPs (anti-bot) regardless of origin state, so a public
        # HTTP probe can't distinguish "CF blocking runner" from "origin down".
        # SSH + loopback curl tests the real thing: VPS reachable, container
        # running, app answering /healthz with 200.
        id: probe
        continue-on-error: true
        timeout-minutes: 2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 60s
          script: |
            set -e
            # Three attempts spaced over ~15s to survive transient blips.
            for i in 1 2 3; do
              CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:8000/healthz || echo "000")
              echo "attempt $i: HTTP $CODE"
              [ "$CODE" = "200" ] && exit 0
              sleep 5
            done
            exit 1

      - name: Reboot Scaleway instance
        if: steps.probe.outcome == 'failure'
        env:
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_SERVER_ID: ${{ secrets.SCW_SERVER_ID }}
          SCW_ZONE: ${{ secrets.SCW_ZONE }}
        run: |
          echo "Origin probe failed — triggering VPS reboot"
          HTTP=$(curl -s -o /tmp/scw.json -w "%{http_code}" \
            -X POST \
            -H "X-Auth-Token: $SCW_SECRET_KEY" \
            -H "Content-Type: application/json" \
            -d '{"action":"reboot"}' \
            "https://api.scaleway.com/instance/v1/zones/$SCW_ZONE/servers/$SCW_SERVER_ID/action")
          cat /tmp/scw.json
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "202" ]; then
            echo "Reboot API call failed with HTTP $HTTP"
            exit 1
          fi
