name: Deploy to Fly.io (canary)

# Runs alongside the Scaleway deploy on every push to main so both targets
# stay in sync until one is picked.  Kill the unused workflow later.
on:
  push:
    branches: [main, fly-deploy]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
